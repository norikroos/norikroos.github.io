<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slight - やさしい灯りで夜をともす</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1400 0%, #2d1f00 50%, #0d0d0d 100%);
      color: #f5e6c8;
    }
    .container {
      background: rgba(30, 25, 15, 0.9);
      border-radius: 20px;
      padding: 40px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 80px rgba(255,200,100,0.05);
      border: 1px solid rgba(255,200,100,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .icon {
      width: 80px;
      height: 80px;
      border-radius: 18px;
      background: radial-gradient(circle at 50% 45%, rgba(255,225,180,0.9), rgba(180,140,60,0.6) 60%, rgba(40,30,10,0.9));
      box-shadow: 0 0 30px rgba(255,200,100,0.3);
    }
    h1 { font-size: 28px; color: rgba(255,225,180,0.95); }
    p { color: rgba(255,225,180,0.6); font-size: 15px; line-height: 1.6; }
    .features { font-size: 13px; color: rgba(255,225,180,0.45); line-height: 1.8; }
    a img { height: 44px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon"></div>
    <h1>Slight</h1>
    <p>やさしい灯りで夜をともす<br>授乳・読書・リラックスのための暖色ライト</p>
    <div class="features">
      明るさ・色温度・サイズを直感操作<br>
      広告なしオプション対応
    </div>
    <a href="https://apps.apple.com/app/id6752028816">
      <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/ja-jp" alt="App Storeからダウンロード">
    </a>
  </div>
</body>
</html>
